<!DOCTYPE html>
<html>
<head>
    <title>iPad Space Shooter</title>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: system-ui, sans-serif; text-align: center; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #gameCanvas { background: #0b1329; display: block; margin: 0 auto; border: 4px solid #1e293b; max-width: 100vw; max-height: 80vh; }
        .controls { padding: 15px; background: #1e293b; display: flex; justify-content: center; gap: 20px; }
        .ctrl-btn { font-size: 28px; padding: 15px 35px; background: #3b82f6; border: none; color: white; border-radius: 12px; font-weight: bold; }
        .ctrl-btn:active { background: #1d4ed8; }
        h1 { margin: 10px 0 5px 0; font-size: 24px; color: #38bdf8; }
    </style>
</head>
<body>

    <h1>🚀 Score: <span id="scoreVal">0</span> | Lives: <span id="livesVal">3</span></h1>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    
    <div class="controls">
        <button class="ctrl-btn" id="leftBtn">◀ Left</button>
        <button class="ctrl-btn" id="fireBtn">💥 FIRE</button>
        <button class="ctrl-btn" id="rightBtn">Right ▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game objects
        let player = { x: 180, y: 440, width: 40, height: 30, speed: 8 };
        let lasers = [];
        let enemies = [];
        let score = 0;
        let lives = 3;
        let gameActive = true;

        // Touch Control Triggers
        let moveLeft = false;
        let moveRight = false;

        document.getElementById("leftBtn").addEventListener("touchstart", () => moveLeft = true);
        document.getElementById("leftBtn").addEventListener("touchend", () => moveLeft = false);
        document.getElementById("rightBtn").addEventListener("touchstart", () => moveRight = true);
        document.getElementById("rightBtn").addEventListener("touchend", () => moveRight = false);
        document.getElementById("fireBtn").addEventListener("touchstart", () => spawnLaser());

        function spawnLaser() {
            if (!gameActive) return;
            lasers.push({ x: player.x + 18, y: player.y, width: 4, height: 15, speed: 7 });
        }

        function spawnEnemy() {
            if (!gameActive) return;
            let enemyWidth = 30;
            let randomX = Math.floor(Math.random() * (canvas.width - enemyWidth));
            enemies.push({ x: randomX, y: -30, width: enemyWidth, height: 30, speed: 2 + (score * 0.1) });
        }
        setInterval(spawnEnemy, 1200); // Spawns an alien enemy every 1.2 seconds

        function updateGame() {
            if (!gameActive) return;

            // Move player based on button holding
            if (moveLeft && player.x > 0) player.x -= player.speed;
            if (moveRight && player.x < canvas.width - player.width) player.x += player.speed;

            // Update lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;
                if (lasers[i].y < 0) lasers.splice(i, 1);
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // Enemy goes past screen border
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    lives--;
                    document.getElementById("livesVal").innerText = lives;
                    if (lives <= 0) { gameActive = false; alert("GAME OVER! Final Score: " + score); }
                    continue;
                }

                // Check collisions with lasers
                for (let j = lasers.length - 1; j >= 0; j--) {
                    if (lasers[j].x < enemies[i].x + enemies[i].width &&
                        lasers[j].x + lasers[j].width > enemies[i].x &&
                        lasers[j].y < enemies[i].y + enemies[i].height &&
                        lasers[j].y + lasers[j].height > enemies[i].y) {
                        
                        enemies.splice(i, 1);
                        lasers.splice(j, 1);
                        score += 10;
                        document.getElementById("scoreVal").innerText = score;
                        break;
                    }
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player ship (Green)
            ctx.fillStyle = "#22c55e";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw lasers (Cyan neon bursts)
            ctx.fillStyle = "#06b6d4";
            for (let laser of lasers) {
                ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
            }

            // Draw enemy aliens (Red squares)
            ctx.fillStyle = "#ef4444";
            for (let enemy of enemies) {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            }
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // Launch game core loop
        gameLoop();
    </script>
</body>
</html>
